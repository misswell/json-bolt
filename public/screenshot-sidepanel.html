<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JsonBolt Side Panel</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, sans-serif;
  background: #f7f8fb; color: #17202a; font-size: 14px;
  width: 420px; height: 700px; overflow: hidden;
}

.header {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 12px; border-bottom: 1px solid #d8e0eb;
  background: rgba(247,248,251,0.96);
}
.header h1 { font-size: 16px; font-weight: 700; color: #101820; }
.header span { font-size: 10px; color: #687386; }

.toolbar {
  display: flex; flex-wrap: wrap; gap: 4px;
  padding: 8px 12px; border-bottom: 1px solid #e5ebf3;
  background: rgba(247,248,251,0.96);
}
.toolbar button {
  height: 28px; min-width: 50px;
  border: 1px solid #c9d2df; border-radius: 5px;
  background: #fff; color: #17202a;
  padding: 0 6px; font-size: 11px; cursor: pointer;
}

.workspace {
  padding: 8px 12px;
}

textarea {
  width: 100%; height: 120px;
  border: 1px solid #c9d2df; border-radius: 6px;
  padding: 8px; font-family: monospace; font-size: 11px;
  resize: vertical; outline: none;
}
textarea:focus { border-color: #2f6fed; }

.search-box {
  display: flex; gap: 6px; align-items: center; margin: 8px 0;
}
.search-box input {
  flex: 1; height: 28px; border: 1px solid #c9d2df; border-radius: 5px;
  padding: 0 8px; font-size: 11px; outline: none;
}
.search-box span { font-size: 11px; color: #687386; }
.search-box button {
  height: 28px; border: 1px solid #c9d2df; border-radius: 5px;
  background: #fff; padding: 0 6px; font-size: 11px; cursor: pointer;
}

.tree-view {
  border: 1px solid #c9d2df; border-radius: 6px; background: #fff;
  overflow: auto; max-height: 480px;
}
.row {
  display: flex; align-items: center; height: 26px;
  border-bottom: 1px solid #eef2f6;
  font-family: monospace; font-size: 11px; white-space: nowrap;
}
.row .twisty {
  width: 20px; min-width: 20px; text-align: center;
  color: #4d5b6d; font-size: 9px;
}
.row .key { color: #8b3f9f; }
.row .str { color: #176f41; }
.row .num { color: #0b62a3; }
.row .bool { color: #b25100; }
.row .punc { color: #4d5b6d; }
.row .count { color: #7d8898; margin-left: 6px; font-size: 10px; }

.badge {
  position: fixed; bottom: 8px; right: 8px;
  background: rgba(0,0,0,0.7); color: #fff;
  padding: 2px 8px; border-radius: 3px;
  font-size: 10px;
}
</style>
</head>
<body>

<div class="header">
  <h1>⚡ JsonBolt</h1>
  <span>Side Panel</span>
</div>

<div class="toolbar">
  <button>▶ Parse</button>
  <button>📋 Paste</button>
  <button>📑 Copy</button>
  <button>⊞ Expand</button>
  <button>⊟ Collapse</button>
  <button>✕ Clear</button>
</div>

<div class="workspace">
  <textarea>{"api_version":"v3","endpoints":["users","posts","comments"],"auth":{"type":"oauth2","scopes":["read","write"]}}</textarea>
  <div class="search-box">
    <input type="text" placeholder="Search...">
    <span>—</span>
  </div>
  <div class="tree-view">
    <div class="row" style="padding-left:0px"><span class="twisty">▼</span><span class="punc">{</span><span class="count">4 keys</span></div>
    <div class="row" style="padding-left:16px"><span class="twisty"></span><span class="key">"api_version"</span><span class="sep">: </span><span class="str">"v3"</span></div>
    <div class="row" style="padding-left:16px"><span class="twisty">▼</span><span class="key">"endpoints"</span><span class="sep">: </span><span class="punc">[</span><span class="count">3 items</span></div>
    <div class="row" style="padding-left:32px"><span class="twisty"></span><span class="str">"users"</span></div>
    <div class="row" style="padding-left:32px"><span class="twisty"></span><span class="str">"posts"</span></div>
    <div class="row" style="padding-left:32px"><span class="twisty"></span><span class="str">"comments"</span></div>
    <div class="row" style="padding-left:16px"><span class="twisty">▼</span><span class="key">"auth"</span><span class="sep">: </span><span class="punc">{</span><span class="count">2 keys</span></div>
    <div class="row" style="padding-left:32px"><span class="twisty"></span><span class="key">"type"</span><span class="sep">: </span><span class="str">"oauth2"</span></div>
    <div class="row" style="padding-left:32px"><span class="twisty">▼</span><span class="key">"scopes"</span><span class="sep">: </span><span class="punc">[</span><span class="count">2 items</span></div>
    <div class="row" style="padding-left:48px"><span class="twisty"></span><span class="str">"read"</span></div>
    <div class="row" style="padding-left:48px"><span class="twisty"></span><span class="str">"write"</span></div>
  </div>
</div>

<div class="badge">Screenshot 4 — Side Panel</div>
</body>
</html>
